<!doctype html>
<html lang="%%htmlLang%%">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%%v7PageTitle%%</title>
    <meta name="description" content="%%v7MetaDescription%%" />
    <link rel="canonical" href="%%canonicalUrl%%" />
    <link rel="alternate" hreflang="es" href="%%hreflangEs%%" />
    <link rel="alternate" hreflang="en" href="%%hreflangEn%%" />
    <link rel="alternate" hreflang="x-default" href="%%hreflangEs%%" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="%%v7PageTitle%%" />
    <meta property="og:description" content="%%v7MetaDescription%%" />
    <meta property="og:url" content="%%canonicalUrl%%" />
    <meta property="og:image" content="%%ogImage%%" />
    <meta property="og:site_name" content="Guitar Chords" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%%v7PageTitle%%" />
    <meta name="twitter:description" content="%%v7MetaDescription%%" />
    <meta name="twitter:image" content="%%ogImage%%" />
    <link rel="icon" type="image/svg+xml" href="%%ASSETS_PREFIX%%favicon.svg" />
    <link rel="manifest" href="%%MANIFEST_HREF%%" />
    <meta name="theme-color" content="#fdfaf5" />
    <link rel="apple-touch-icon" href="%%ASSETS_PREFIX%%icons/icon-192.png" />
    <link rel="stylesheet" href="%%ASSETS_PREFIX%%site.css" />
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-0S8GH7ZFHT"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-0S8GH7ZFHT");
    </script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="%%homeHref%%">
        <svg class="logo" viewBox="0 0 48 48" aria-hidden="true">
          <rect class="frame" x="8" y="8" width="32" height="32" rx="3" />
          <line class="string" x1="18" y1="8" x2="18" y2="40" />
          <line class="string" x1="24" y1="8" x2="24" y2="40" />
          <line class="string" x1="30" y1="8" x2="30" y2="40" />
          <line class="string" x1="8" y1="20" x2="40" y2="20" />
          <line class="string" x1="8" y1="30" x2="40" y2="30" />
          <circle class="dot" cx="18" cy="25" r="3.2" />
          <circle class="dot" cx="30" cy="15" r="3.2" />
        </svg>
        <span class="wordmark"
          >%%wordmark%%<small>%%wordmarkSmall%%</small></span
        >
      </a>
      <a class="lang-toggle" href="%%altLangHref%%">%%altLangLabel%%</a>
    </header>

    <h1>%%v7H1%%</h1>
    <p class="v7-back-link"><a href="%%homeHref%%">%%v7HomeLink%%</a></p>
    <p class="lead">%%v7Lead%%</p>

    <div class="v7-grid" id="v7Grid">
      <div class="v7-grid-head">
        <span>%%v7ColTonic%%</span>
        <span>%%v7ColDominant%%</span>
      </div>
    </div>

    <footer>
      <div class="extension-cta">
        <svg class="ext-icon" viewBox="0 0 48 48" aria-hidden="true">
          <rect
            class="frame"
            x="8"
            y="8"
            width="32"
            height="32"
            rx="3"
            fill="none"
            stroke="#d8d2c4"
            stroke-width="4"
          />
          <line
            class="string"
            x1="18"
            y1="8"
            x2="18"
            y2="40"
            stroke="#1a1a1a"
            stroke-width="2"
            opacity="0.4"
          />
          <line
            class="string"
            x1="24"
            y1="8"
            x2="24"
            y2="40"
            stroke="#1a1a1a"
            stroke-width="2"
            opacity="0.4"
          />
          <line
            class="string"
            x1="30"
            y1="8"
            x2="30"
            y2="40"
            stroke="#1a1a1a"
            stroke-width="2"
            opacity="0.4"
          />
          <line
            class="string"
            x1="8"
            y1="20"
            x2="40"
            y2="20"
            stroke="#1a1a1a"
            stroke-width="2"
            opacity="0.4"
          />
          <line
            class="string"
            x1="8"
            y1="30"
            x2="40"
            y2="30"
            stroke="#1a1a1a"
            stroke-width="2"
            opacity="0.4"
          />
          <circle cx="18" cy="25" r="3.2" fill="#8b0000" />
          <circle cx="30" cy="15" r="3.2" fill="#8b0000" />
        </svg>
        <div class="ext-body">
          <p class="ext-heading">%%extensionHeading%%</p>
          <p class="ext-desc">%%extensionDescription%%</p>
          %%EXTENSION_CTA_BUTTON%%
        </div>
      </div>
    </footer>

    <script src="%%ASSETS_PREFIX%%vendor/svguitar.umd.js"></script>
    <script src="%%ASSETS_PREFIX%%chords-db.js"></script>
    <script src="%%ASSETS_PREFIX%%chord-diagram.js"></script>
    <script src="%%ASSETS_PREFIX%%v7-guide.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("%%SW_PATH%%").catch(function () {});
        });
      }
    </script>
  </body>
</html>
