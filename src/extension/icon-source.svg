<?xml version="1.0" encoding="UTF-8"?>
<!--
  Icono de la extension: logo del header del sitio (diapason con dos puntos)
  con los colores inlineados desde CSS (assets/lesson.css .site-header .logo):
    .frame  = stroke #1a1a1a (ink), fill none, stroke-width 4
    .string = stroke #1a1a1a (ink), stroke-width 2, opacity 0.5
    .dot    = fill #8b0000 (accent)
  Sobre un tile de fondo color papel #fdfaf5 (paper) con esquinas redondeadas,
  para que se lea sobre temas claros y oscuros de Chrome.
  Fuente del logo: reference/chord-finder.html (lineas 14-23), viewBox 0 0 48 48.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Tile papel redondeado -->
  <rect x="1" y="1" width="46" height="46" rx="9" fill="#fdfaf5"/>
  <!-- Logo del header, colores inlineados -->
  <g fill="none" stroke-linecap="round">
    <rect x="8" y="8" width="32" height="32" rx="3" fill="none" stroke="#1a1a1a" stroke-width="4"/>
    <line x1="18" y1="8" x2="18" y2="40" stroke="#1a1a1a" stroke-width="2" opacity="0.5"/>
    <line x1="24" y1="8" x2="24" y2="40" stroke="#1a1a1a" stroke-width="2" opacity="0.5"/>
    <line x1="30" y1="8" x2="30" y2="40" stroke="#1a1a1a" stroke-width="2" opacity="0.5"/>
    <line x1="8" y1="20" x2="40" y2="20" stroke="#1a1a1a" stroke-width="2" opacity="0.5"/>
    <line x1="8" y1="30" x2="40" y2="30" stroke="#1a1a1a" stroke-width="2" opacity="0.5"/>
    <circle cx="18" cy="25" r="3.2" fill="#8b0000" stroke="none"/>
    <circle cx="30" cy="15" r="3.2" fill="#8b0000" stroke="none"/>
  </g>
</svg>
